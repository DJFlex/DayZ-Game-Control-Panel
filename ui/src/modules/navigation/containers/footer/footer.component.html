<footer class="py-3 bg-light mt-auto">
    <div class="container">
        <div class="d-flex align-items-center justify-content-between small">
            <ng-container *ngIf="(branding.changes | async)?.footerText as footerText; else defaultFooter">
                <div class="text-muted">{{ footerText }}</div>
                <div class="text-muted">@ {{ version }}</div>
            </ng-container>
            <ng-template #defaultFooter>
                <div class="text-muted">
                    <a href="https://github.com/mr-guard/dayz-server-manager">DayZ Server Manager</a> @ {{ version }}
                </div>
                <div class="text-muted">
                    Copyright &copy; <a href="https://github.com/mr-guard">mr-guard</a> 2023
                </div>
            </ng-template>
        </div>
    </div>
</footer>
