<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>DayZ Server Manager</title>
        <base href="/" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" type="image/x-icon" href="favicon.png" />
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.0/css/all.css">
        <script>
            // Apply the saved theme before Angular boots to avoid a flash of the
            // wrong theme. Kept in sync afterwards by ThemeService.
            (function () {
                try {
                    if (localStorage.getItem('dzsm-theme') === 'dark') {
                        document.documentElement.setAttribute('data-theme', 'dark');
                    }
                } catch (e) { /* ignore */ }
            })();
        </script>
    </head>
    <body>
        <app-root></app-root>
    </body>
</html>
